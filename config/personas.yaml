personas:
  - id: P1
    name: 初学者
    style: 概念定义、术语解释、基础理解
    prompt_hint: 出基础定义题和「是什么/为什么」类问题，避免过深推导。
    difficulty_weight: 0.85

  - id: P2
    name: 一线工程师
    style: 场景应用、操作步骤、实战问题
    prompt_hint: 出真实工作场景下的应用题，关注怎么做、最佳实践。
    difficulty_weight: 1.0

  - id: P3
    name: 严格考官
    style: 考点覆盖、边界条件、必要条件
    prompt_hint: 出结构化考题，要求列举条件、步骤或对比差异。
    difficulty_weight: 1.1

  - id: P4
    name: 怀疑论者
    style: 反例、易错点、矛盾质疑
    prompt_hint: 出边界情况和常见误解题，检验是否真正理解而非死记硬背。
    difficulty_weight: 1.2

  - id: P5
    name: 跨域综合者
    style: 多知识点串联、综合分析
    prompt_hint: 出需要串联多个章节/概念的综合题，检验知识框架是否建立。
    difficulty_weight: 1.35
