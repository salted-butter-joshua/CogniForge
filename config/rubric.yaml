rubric:
  dimensions:
    - name: factual_correctness
      weight: 0.55
      description: 答案核心含义与 evidence 一致即可；允许换词、概括，不要求逐字匹配原文
    - name: completeness
      weight: 0.20
      description: 覆盖问题关键点（语义层面，非字面罗列）
    - name: clarity
      weight: 0.10
      description: 表达清楚、结构合理
    - name: boundary_awareness
      weight: 0.15
      description: 机制边界须准确（条件/对象/默认后果）；证据不足时承认不知道； plausible 但错误的机制扩展从严
  correct_threshold: 0.80
  target_accuracy: 0.95
  scoring_rules:
    - evidence_only 模式：仅能看到 evidence_refs 原文
    - exam_memory 模式（推荐）：可见学生闭卷记忆 + evidence 锚点 + 资料摘要；以答对为主，允许合理扩展
    - contradiction_only 模式：以 evidence/记忆检查矛盾为主，不因 evidence 未覆盖的细节单独扣分
    - 以「中心意思是否一致 / 题目是否答对」为主：同义表述、合理概括、正确换词应给高分
    - 答案可包含笔记、资料或合理先验中的额外正确细节；只要不与 evidence/资料/记忆明显矛盾，不得因「evidence 未提及」扣分
    - 仅当核心概念错误、机制条件写反、或与 evidence/资料/记忆明显矛盾时才判错
    - 学生明确说「不知道/不确定」且确实无法从闭卷材料回答，应给 partial 分而非 0 分
    - 英文术语大小写不敏感（etcd/Etcd/ETCD 等价）；中英同义表述中心一致即算对
    - 机制/因果题须核对：触发条件、作用对象、默认后果是否与参考资料一致（非仅 evidence 字面）
    - reason 字段须完整说明扣分点，便于学生改笔记；不要只写「不准确」
