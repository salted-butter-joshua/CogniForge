rubric:
  dimensions:
    - name: factual_correctness
      weight: 0.55
      description: 答案事实必须能在 evidence_refs 对应原文中找到，禁止合理外推
    - name: completeness
      weight: 0.20
      description: 覆盖问题关键点（仅限 evidence 范围内）
    - name: clarity
      weight: 0.10
      description: 表达清楚、结构合理
    - name: boundary_awareness
      weight: 0.15
      description: 证据不足时必须承认不知道，编造细节从严扣分
  correct_threshold: 0.85
  target_accuracy: 0.95
  scoring_rules:
    - 你只能看到每道题的 evidence_refs 原文，看不到学生笔记和完整教材
    - evidence 未提及的细节一律视为错误或过拟合，不得因「合理推断」给高分
    - P4/P5 综合题与排错题权重更高，需严格核对多段 evidence
