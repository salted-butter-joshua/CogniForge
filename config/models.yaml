# MiniMax 模型预设 — 按角色分配
# 别名可在各 router 下自动解析为正确 model id

aliases:
  minimax-m2.7:
    litellm: minimax/MiniMax-M2.7
    minimax: MiniMax-M2.7
    openrouter: minimax/minimax-m2.7
  minimax-m3:
    litellm: minimax/MiniMax-M3
    minimax: MiniMax-M3
    openrouter: minimax/minimax-m3
  minimax-m2.7-highspeed:
    litellm: minimax/MiniMax-M2.7-highspeed
    minimax: MiniMax-M2.7-highspeed
    openrouter: minimax/minimax-m2.7-highspeed

presets:
  # 均衡：学习/资料用 M2.7，评判/观察用 M3，出题用高速版
  minimax_default:
    student: minimax-m2.7
    persona: minimax-m2.7-highspeed
    judge: minimax-m3
    observer: minimax-m3
    material: minimax-m2.7

  # 速度优先：除 Judge 外全部高速版
  minimax_speed:
    student: minimax-m2.7-highspeed
    persona: minimax-m2.7-highspeed
    judge: minimax-m2.7
    observer: minimax-m2.7-highspeed
    material: minimax-m2.7-highspeed

  # 质量优先：核心角色全部 M3
  minimax_quality:
    student: minimax-m3
    persona: minimax-m2.7
    judge: minimax-m3
    observer: minimax-m3
    material: minimax-m3

  # 使用 .env 中 STUDENT_MODEL 等自定义配置
  custom: {}
